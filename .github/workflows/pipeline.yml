name: E-Commerce CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Triggers whenever you push code

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
    # This compiles the code and checks for errors
      run: mvn clean compile 

    - name: Run Automated Unit Tests
    # This runs your JUnit tests from Task 2
      run: mvn test

    - name: Package Application
      # Creates the final JAR file in the /target folder
      run: mvn package -DskipTests 

    - name: Upload Artifact
      # This saves the build so it can be deployed later
      uses: actions/upload-artifact@v4
      with:
        name: order-management-app
        path: target/*.jar